# Jira-to-Backlog Sync Configuration
# Copy to config.yml and fill in your values.
# All values can be overridden with environment variables.

jira_url: "https://your-org.atlassian.net"  # or env JIRA_URL
jira_email: "you@example.com"               # or env JIRA_EMAIL
jira_token: ""                               # or env JIRA_TOKEN (API token)

# JQL query to select issues for sync
jql_query: "project = PROJ AND status != Done ORDER BY created DESC"  # or env JIRA_JQL

# Path to backlog milestones directory (relative to repo root)
backlog_milestones_path: "backlog/milestones"

